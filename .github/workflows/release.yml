name: Release to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade pip build

      - name: Verify pyproject version matches tag
        if: github.event_name == 'push'
        run: |
          set -eu
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION="$(python -c 'import tomllib, sys; print(tomllib.loads(open("pyproject.toml","rb").read().decode())["project"]["version"])')"
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match pyproject version $PYPROJECT_VERSION"
            exit 1
          fi

      - name: Build distributions
        run: python -m build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/ga-mcp-full/
    permissions:
      id-token: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish via PyPI trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
